  <!-- Suspenders -->
  <line x1="30" y1="70" x2="35" y2="47" stroke="#000080" stroke-width="2.5"/>
  <line x1="45" y1="70" x2="48" y2="36" stroke="#000080" stroke-width="2.5"/>
  <line x1="55" y1="70" x2="52" y2="36" stroke="#000080" stroke-width="2.5"/>
  <line x1="70" y1="70" x2="65" y2="47" stroke="#000080" stroke-width="2.5"/>
</svg>
